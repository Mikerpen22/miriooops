baseURL = "https://mirilog.netlify.app/"
title = "MiriLog"
languageCode = "en-us"
theme = "mirilog"

[pagination]
  pagerSize = 20

rssLimit = 20
copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License."

archetypeDir = "archetypes"
contentDir = "content"
dataDir = "data"
layoutDir = "layouts"
publishDir = "public"

buildDrafts = false
buildFuture = false
buildExpired = false
canonifyURLs = true

enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

[permalinks]
  posts = "/posts/:year/:month/:title/"

[author]
  name = "Michael Shih"

[taxonomies]
  tag = "tags"

[params]
  description = "thoughts on systems, ml, and how things work under the hood"
  bio = "**physicist turned engineer.** interested in systems, ml, and how things work under the hood."
  siteName = "Michael Shih"
  author = "Michael Shih"

# ── Markdown (Goldmark + GFM) ──────────────────
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      strikethrough = true
      table = true
      taskList = true
      footnote = true
    [markup.goldmark.parser]
      autoHeadingID = true
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "dracula"
    noClasses = true
    lineNos = false
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

# ── Custom output formats for llms.txt ────────
[mediaTypes."text/plain"]
  suffixes = ["txt"]

[outputFormats.LLMS]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.LLMSFULL]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFULL", "ROBOTS"]
