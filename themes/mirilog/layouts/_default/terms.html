{{ define "main" }}

<p class="section-label">~/tags</p>

<div class="tags-grid">
  {{ range .Data.Terms.ByCount }}
  <a href="{{ .Page.Permalink }}" class="tag-card">
    <span class="tag-card-name">#{{ .Page.Title }}</span>
    <span class="tag-card-count">{{ .Count }} {{ if eq .Count 1 }}post{{ else }}posts{{ end }}</span>
  </a>
  {{ end }}
</div>

{{ end }}
